<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Minecraft</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#76c7ff 0%, #76c7ff 50%, #5fbf3f 50%, #3b8f2f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #2b1d13;
      border: 6px solid #5a351e;
      border-radius: 15px;
      padding: 15px;
      width: 95%;
      max-width: 420px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 26px;
      color: #ffe066;
      text-shadow: 3px 3px 0 #000;
      margin-bottom: 10px;
    }

    .aviso {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .video-container {
      width: 100%;
      max-width: 300px;
      margin: auto;
      border: 5px solid #8b8b8b;
      border-radius: 10px;
      overflow: hidden;
      background: black;
    }

    video {
      width: 100%;
      aspect-ratio: 9/16;
      display: block;
      object-fit: contain;
    }

    .info {
      font-size: 16px;
      margin: 10px 0;
      text-shadow: 1px 1px 0 #000;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 15px;
      background: #3fcf4a;
      color: white;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      border: 4px solid #1c7d25;
      text-shadow: 2px 2px 0 #000;
    }

  </style>
</head>

<body>

  <div class="card">
    
    <h1>Ven a Celebrar en Modo Minecraft</h1>

    <div class="aviso">🔊 Dale play al video</div>

    <div class="video-container">
      <video controls playsinline preload="auto">
        <source src="invitacion.mp4" type="video/mp4">
      </video>
    </div>

    <div class="info">📅 Sábado 16 de marzo</div>
    <div class="info">⏰ 1:30 pm</div>
    <div class="info">📍 Calle Benito Juarez 1407, Miguel Hidalgo, Culiacán</div>

    <a class="btn" href="https://forms.gle/hPQqSoP4MS6sHKdT6" target="_blank">
      Confirmar asistencia
    </a>

  </div>

</body>
</html>
